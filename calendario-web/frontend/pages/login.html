<meta charset="UTF-8" />
<title>Login · Nosso Calendário</title>
<link rel="stylesheet" href="../css/base.css" />
<link rel="stylesheet" href="../css/components.css" />
<link rel="stylesheet" href="../css/login.css" />

<div class="auth-page">
  <div class="auth-shell">
    <aside class="auth-hero">
      <div class="auth-hero-content">
        <div class="auth-hero-logo">💑</div>
        <h1>Nosso Calendário</h1>
        <p>O calendário de vocês dois — compromissos, fotos e lembranças, sempre à mão.</p>
      </div>
    </aside>

    <div class="auth-form-side">
      <div class="card auth-card fade-in">
        <h2>Bem-vindo de volta</h2>
        <p>Entre para ver o calendário do casal</p>

        <form id="login-form">
          <div class="field">
            <label for="name">Nome</label>
            <input type="text" id="name" name="name" required autocomplete="username" />
          </div>
          <div class="field">
            <label for="password">Senha</label>
            <input type="password" id="password" name="password" required autocomplete="current-password" />
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="btn-submit">Entrar</button>
        </form>

        <p class="auth-hint">Contas: <strong>Victor</strong> e <strong>Maria</strong> · senha <strong>2605</strong></p>

        <p class="auth-footer">Não tem conta? <a href="register.html">Cadastre-se</a></p>
      </div>
    </div>
  </div>
</div>

<script type="module" src="../js/pages/login.js"></script>
