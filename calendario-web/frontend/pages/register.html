<meta charset="UTF-8" />
<title>Criar conta · Calendário Pessoal</title>
<link rel="stylesheet" href="../css/base.css" />
<link rel="stylesheet" href="../css/components.css" />
<link rel="stylesheet" href="../css/login.css" />

<div class="auth-page">
  <div class="auth-shell">
    <aside class="auth-hero">
      <div class="auth-hero-content">
        <div class="auth-hero-logo">📅</div>
        <h1>Calendário Pessoal</h1>
        <p>Crie sua conta e comece a compartilhar o calendário com o seu grupo.</p>
      </div>
    </aside>

    <div class="auth-form-side">
      <div class="card auth-card fade-in">
        <h2>Criar conta</h2>
        <p>Cadastre-se para acessar o calendário compartilhado</p>

        <form id="register-form">
          <div class="field">
            <label for="name">Nome</label>
            <input type="text" id="name" name="name" required autocomplete="name" />
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autocomplete="email" />
          </div>
          <div class="field">
            <label for="password">Senha</label>
            <input type="password" id="password" name="password" required minlength="6" autocomplete="new-password" />
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="btn-submit">Cadastrar</button>
        </form>

        <p class="auth-footer">Já tem conta? <a href="login.html">Entrar</a></p>
      </div>
    </div>
  </div>
</div>

<script type="module" src="../js/pages/register.js"></script>
